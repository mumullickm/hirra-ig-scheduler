name: Hirra IG publish

# IG has no native scheduling API, so we cron the two daily slots.
# 06:00 UTC = 10:00 Dubai, 16:30 UTC = 20:30 Dubai. GH cron can drift 5-15 min
# under load; run.py publishes any due-but-unposted slot, so a late/missed run
# self-heals on the next tick.
on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '30 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish due IG posts
        env:
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
        run: python3 run.py
      - name: Commit updated state
        run: |
          git config user.name "hirra-bot"
          git config user.email "hirra-bot@users.noreply.github.com"
          git add posted.json
          git diff --staged --quiet || git commit -m "state: update posted [skip ci]"
          git push
