name: Hirra Statics publish

# ONE feed post/day to Instagram + Facebook at 13:05 UTC (19:05 Bangladesh /
# 16:05 Saudi). Cut from two a day to one on 2026-07-24 after the reach audit:
# statics reached 0-2 people per post while reels were the only format pulling
# real distribution, so reels now lead and statics support. The 15:20 tick is a
# catch-up pass; run_statics.py posts any due-but-unposted static, so a late or
# missed cron tick self-heals on the next run without double-posting.
on:
  schedule:
    - cron: '10 13 * * *'
    - cron: '20 15 * * *'   # catch-up for a missed or throttled first tick
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-statics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish due statics (IG + FB)
        env:
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
        run: python3 run_statics.py
      - name: Commit updated state
        run: |
          git config user.name "hirra-bot"
          git config user.email "hirra-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add posted_statics.json
          git diff --staged --quiet || git commit -m "state: update posted statics [skip ci]"
          git push
